<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <header>
        <input type="checkbox" id="toggler">
        <label for="toggler" class="fas fa-bars"></label>
        <a href="index.html" class="logo">flower <span>.</span></a>
        <nav class="navBar">
            <a href="index.html#home">home</a>
            <a href="index.html#about">about</a>
            <a href="products.html">products</a>
            <a href="index.html#review">review</a>
            <a href="index.html#contact">contact</a>
        </nav>
        <div class="icons">
            <a href="cart.html" class="fas fa-shopping-cart" style="position: relative;"></a>
        </div>
    </header>

    <section class="products" style="padding-top: 12rem;">
        <h1 class="heading"> shopping <span>cart</span> </h1>
        <div id="cart-container" class="box-container"></div>
        
        <div id="checkout-section" style="display:none; text-align: center; margin-top: 3rem;">
            <h2 class="heading"><span>Order</span> Details</h2>
            <form style="max-width: 500px; margin: auto; padding: 20px; box-shadow: 0 .5rem 1rem rgba(0,0,0,.1);">
                <input type="text" placeholder="Your Name" class="box" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ccc;">
                <input type="text" placeholder="Phone Number" class="box" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ccc;">
                <button class="btn">Confirm Order</button>
            </form>
        </div>
    </section>

    <script>
        function renderCart() {
            const container = document.getElementById('cart-container');
            const checkout = document.getElementById('checkout-section');
            let cart = JSON.parse(localStorage.getItem('flowers_cart')) || [];

            if(cart.length === 0) {
                container.innerHTML = '<h2 style="width:100%; text-align:center;">Cart is empty </h2>';
                checkout.style.display = 'none';
                return;
            }

            checkout.style.display = 'block';
            container.innerHTML = cart.map((item, index) => `
                <div class="box">
                    <div class="image"><img src="${item.image}"></div>
                    <div class="content">
                        <h3>${item.name}</h3>
                        <div class="price">${item.price}</div>
                        <p style="font-size: 1.5rem; margin: 10px 0;">Quantity: <b>${item.quantity}</b></p>
                        <button onclick="deleteItem(${index})" class="btn" style="background:red;">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteItem(index) {
            let cart = JSON.parse(localStorage.getItem('flowers_cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('flowers_cart', JSON.stringify(cart));
            renderCart();
            // لتحديث الرقم في الهيدر لو كنتي رابطة script.js
            if(typeof updateCartBadge === "function") updateCartBadge();
        }

        renderCart();
    </script>
    <script src="main/script.js"></script>
</body>
</html>
